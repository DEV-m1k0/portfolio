---
meta:
  environment: node
  toolchain:
    name: nodejs
    version: 18
build:
  additionalCommands:
    - npx prisma generate
    - npx prisma migrate deploy
  artifacts:
    ".next/**": .next
    "node_modules/**": node_modules
    "public/**": public
    "prisma/**": prisma
    "package.json": package.json
    "next.config.ts": next.config.ts
run:
  persistenceMount: /data
  command: npm start
